        /* 广义表可视化优化 */

        .sub-list {
            border: 2px solid #2196F3;
            border-radius: 12px;

        .sub-list .sub-list {

        .sub-list:empty::before {

        /* 响应式调整 */

            .container {

            button {

            }

        /* 保留原有动画 */

            animation: glow 1s ease;

        @keyframes glow {
            0% {

        /* 日志图标 */

        }

        /* 控件布局优化 */

<div class="container">
    <h2>广义表</h2>

    <div class="controls">
        <input type="text" id="inputList" placeholder="输入广义表，如：(A,(B,C),D)" value="(A,(B,C),D)">
        <button onclick="createList()">创建广义表</button>
        <button onclick="getHead()">取表头</button>
        <button onclick="getTail()">取表尾</button>
        <button onclick="getDepth()">求深度</button>
        <button onclick="getLength()">求长度</button>
    </div>

    <div class="stats">
        当前状态：<br>
        长度：<span id="stats-length">0</span><br>
        深度：<span id="stats-depth">0</span><br>
        表头：<span id="stats-head">无</span><br>
        表尾：<span id="stats-tail">无</span>
    </div>

    <div id="list-display" class="gl-container"></div>

    <div class="operation-log">
        <h4>操作日志：</h4>
        <div id="log"></div>
    </div>
</div>
<script src="../js/echarts.js"></script>
<script>
    class GLNode {
        constructor(tag, value) {
            this.tag = tag;   // 0:原子节点，1:子表节点
            this.head = null; // 当前节点的值（原子值或子表头）
            this.tail = null; // 指向下一个节点
        }
    }

    let currentList = null;

    function createList() {
        const input = document.getElementById('inputList').value;
        try {
            currentList = parseList(input);
            renderList();
            updateStats();
            logOperation(`创建成功：${input}`);
        } catch (e) {
            alert("输入格式错误，请按示例格式输入，例如：(A,(B,C),D)");
        }
    }

    // 广义表解析器
    function parseList(str) {
        str = str.replace(/\s/g, '');
        let index = 0;

        function parse() {
            if (str[index] === '(') {
                const node = new GLNode(1);
                index++; // 跳过'('

                node.head = parse();
                let current = node;

                while (str[index] === ',') {
                    index++;
                    current.tail = new GLNode(1);
                    current = current.tail;
                    current.head = parse();
                }

                if (str[index] === ')') index++;
                return node;
            } else {
                // 解析原子节点
                const start = index;
                while (index < str.length && !['(', ')', ','].includes(str[index])) {
                    index++;
                }
                const atom = str.slice(start, index);
                const node = new GLNode(0);
                node.head = atom;
                return node;
            }
        }

        return parse();
    }

    function parsePart(part) {
        try {
            if (typeof part === 'string' && part.startsWith('(')) {
                return parseList(part);
            }
            return /^[^(),]+$/.test(part) ? new GLNode(0, part) : parseList(part);
        } catch {
            return new GLNode(0, part || '');
        }
    }

    function renderList(node = currentList, container = document.getElementById('list-display')) {
        container.innerHTML = '';
        if (!node) return;

        const render = (n, parent, isFirst = true) => {
            if (!n) return;

            // 添加逗号分隔
            if (!isFirst) {
                const comma = document.createElement('span');
                comma.textContent = ', ';
                parent.appendChild(comma);
            }

            if (n.tag === 0) {
                const atom = document.createElement('span');
                atom.className = 'atom';
                atom.textContent = n.head;
                parent.appendChild(atom);
            } else {
                const wrapper = document.createElement('span');
                wrapper.className = 'sub-list';

                const subContainer = document.createElement('span');
                subContainer.className = 'gl-container';

                // 空表处理
                if (!n.head && !n.tail) {
                    subContainer.innerHTML = '&nbsp;'; // 保持空表可见
                } else {
                    render(n.head, subContainer, true);
                }

                wrapper.appendChild(subContainer);
                parent.appendChild(wrapper);
            }

            if (n.tail) {
                render(n.tail, parent, false);
            }
        };

        const wrapper = document.createElement('div');
        wrapper.className = 'gl-container';
        render(node, wrapper, true);
        container.appendChild(wrapper);
    }



    function getHead() {
        if (!currentList || currentList.tag !== 1) {
            alert("无法获取表头");
            return;
        }
        const originalHead = listToString(currentList.head);
        const originalTail = listToString(currentList.tail);
        currentList = currentList.head;
        updateDisplay();
        logOperation(`取表头：保留 ${originalHead || '空'}，移除 ${originalTail || '空'}`);
    }

    function updateDisplay() {
        renderList();
        updateStats();
        // 移除了原来的 logOperation("操作已执行")
    }

    function getTail() {
        if (!currentList || currentList.tag !== 1) {
            alert("无法获取表尾");
            return;
        }
        const originalHead = listToString(currentList.head);
        const originalTail = listToString(currentList.tail);
        currentList = currentList.tail || new GLNode(1); // 保持子表结构
        updateDisplay();
        logOperation(`取表尾：移除 ${originalHead || '空'}，保留 ${originalTail || '空'}`);
    }


    function getDepth() {
        const depth = calculateDepth(currentList);
        logOperation(`当前深度：${depth}`);
    }

    function calculateDepth(node) {
        if (!node) return 0;
        let maxDepth = 0;
        let current = node;
        while (current) {
            if (current.tag === 1) {
                maxDepth = Math.max(maxDepth, calculateDepth(current.head) + 1);
            }
            current = current.tail;
        }
        return maxDepth;
    }

    function getLength() {
        const length = calculateLength(currentList);
        document.getElementById('stats-length').textContent = length;
        logOperation(`当前长度：${length}`);
    }

    function calculateLength(node) {
        if (!node || node.tag === 0) return 0;
        let length = 0;
        let current = node;
        while (current) {
            length++;
            current = current.tail;
        }
        return length;
    }

    function getHeadText() {
        if (!currentList || currentList.tag !== 1) return '无';
        return listToString(currentList.head) || '空表';
    }


    function listToString(node) {
        if (!node) return '';
        if (node.tag === 0) return node.head;

        let result = '';
        let current = node.head;
        while (current) {
            result += (result ? ', ' : '') + listToString(current);
            current = current.tail;
        }
        return `(${result})`;
    }
    function getTailText() {
        if (!currentList || currentList.tag !== 1) return '无';
        return currentList.tail ? listToString(currentList.tail) : '空';
    }



    function updateStats() {
        const length = calculateLength(currentList);
        const depth = calculateDepth(currentList);
        const head = getHeadText();
        const tail = getTailText();

        document.getElementById('stats-length').textContent = length;
        document.getElementById('stats-depth').textContent = depth;
        document.getElementById('stats-head').textContent = head;
        document.getElementById('stats-tail').textContent = tail;
    }

    // 辅助函数
    function highlightOperation() {
        const container = document.getElementById('list-display');
        container.classList.add('highlight');
        setTimeout(() => container.classList.remove('highlight'), 1000);
    }

    function logOperation(message) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.addEventListener('DOMContentLoaded', () => {
        try {
            currentList = parseList('(A,(B,C),D)');
            updateDisplay();
        } catch (e) {
            console.error('初始化错误:', e);
        }
    });

</script>
