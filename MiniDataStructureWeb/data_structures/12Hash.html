<div class="container">
    <h2>哈希表</h2>

    <div class="settings-group">
        <div class="input-group">
            <h4 style="margin: 0; min-width: 100px;">哈希表大小:</h4>
            <div class="input-row">
                <input type="number" id="hashSize" value="10" min="5" max="20">
            </div>
            <div>
                <div class="input-row">
                    <h4 style="margin: 0; min-width: 100px;">输入元素:</h4>
                    <input type="text" id="element" placeholder="输入数字元素">
                    <div class="button-group">
                        <button onclick="addElement()">添加元素</button>
                        <button onclick="clearHashTable()">清除哈希表</button>
                    </div>
                </div>
                <div id="elementList" style="margin-top: 8px; color: #6c757d;"></div>
            </div>
        </div>
    </div>


    <div class="settings-group">
        <div class="input-group">
            <h4 style="margin: 0; min-width: 100px;">哈希函数:</h4>
            <select id="hashMethod">
                <option value="1">直接定址法</option>
                <option value="2">数字分析法</option>
                <option value="3">平方取中法</option>
                <option value="4" selected>除留余数法</option>
                <option value="5">折叠法</option>
            </select>
        </div>

        <div class="input-group">
            <h4 style="margin: 0; min-width: 100px;">冲突处理:</h4>
            <select id="collisionMethod">
                <option value="1">线性探查法</option>
                <option value="2">二次探查法</option>
                <option value="3">再哈希</option>
                <option value="4">公共溢出区</option>
            </select>
        </div>
    </div>

    <div id="hashTableDisplay" class="hash-table"></div>
</div>
<script src="../js/echarts.js"></script>
<script>

    let ht = null;
    let elements = [];

    class HashTable {
        constructor(size) { // 改为接受size参数
            this.size = size;
            this.table = Array(size).fill().map(() => []);
            this.overflow = [];
        }

        hashFunctions = {
            '1': key => key % this.size, // 直接定址法
            '2': key => { // 数字分析法（假设处理6位数字）
                const str = key.toString().padStart(6, '0');
                return parseInt(str.substr(2, 2)) % this.size; // 取中间两位
            },
            '3': key => { // 平方取中
                const square = (key * key).toString().padStart(6, '0');
                return parseInt(square.substr(2, 3)) % this.size;
            },
            '4': key => key % this.size, // 除留余数法
            '5': key => { // 折叠法
                return key.toString().split('').reduce((sum, d) => sum + parseInt(d), 0) % this.size;
            }
        };

        // 冲突处理方法集合
        collisionHandlers = {
            '1': (index, key) => { // 线性探查
                let i = 1;
                while (this.table[(index + i) % this.size].length > 0) {
                    i++;
                    if (i > this.size) throw "哈希表已满";
                }
                return (index + i) % this.size;
            },
            '2': (index, key) => { // 二次探查
                let i = 1;
                while (this.table[(index + i * i) % this.size].length > 0) {
                    i++;
                    if (i > this.size) throw "哈希表已满";
                }
                return (index + i * i) % this.size;
            },
            '3': (index, key) => { // 链表法
                this.table[index].push(key);
                return index;
            },
            '4': (index, key) => { // 公共溢出区
                this.overflow.push(key);
                return index;
            }
        };

        insert(key, hashMethod, collisionMethod) {
            if (!this.hashFunctions[hashMethod]) throw `无效哈希方法: ${hashMethod}`;
            if (!this.collisionHandlers[collisionMethod]) throw `无效冲突处理: ${collisionMethod}`;


            const hashFn = this.hashFunctions[hashMethod];
            const collisionFn = this.collisionHandlers[collisionMethod];

            let index = hashFn(key);
            if (index < 0 || index >= this.size) {
                throw `哈希值越界: ${index} (允许范围0-${this.size - 1})`;
            }

            // 冲突处理
            if (this.table[index].length === 0) {
                this.table[index] = [key];
            } else {
                index = collisionFn.call(this, index, key);
            }
        }

        display() {
            const mainTable = this.table.map((slot, i) =>
                `<div class="slot">${i}: ${slot.join(' → ')}</div>`
            ).join('');

            const overflow = this.overflow.length ?
                `<div class="overflow-area">
            <strong>溢出区:</strong> ${this.overflow.join(' → ')}
        </div>` : '';

            return mainTable + overflow;
        }
    }

    function addElement() {
        try {
            const input = document.getElementById('element');
            const key = parseInt(input.value);
            if (isNaN(key)) throw "请输入有效数字";

            if (!ht) { // 首次使用时初始化
                const size = parseInt(document.getElementById('hashSize')?.value) || 10;
                ht = new HashTable(size);
            }

            const hashMethod = document.getElementById('hashMethod').value;
            const collisionMethod = document.getElementById('collisionMethod').value;

            ht.insert(key, hashMethod, collisionMethod);
            elements.push(key);

            // 更新显示
            document.getElementById('elementList').textContent = `已添加元素: [${elements.join(', ')}]`;
            updateDisplay();
            input.value = ''; // 清空输入框
        } catch (e) {
            alert(`添加失败: ${e}`);
        }
    }

    // 新增清除功能
    function clearHashTable() {
        ht = null;
        elements = [];
        document.getElementById('elementList').textContent = '';
        document.getElementById('hashTableDisplay').innerHTML = '';
    }

    // 提取显示更新逻辑
    function updateDisplay() {
        document.getElementById('hashTableDisplay').innerHTML = `
        <h4>哈希表结构：</h4>
        ${ht.display()}
        <div style="margin-top:10px; color:#666">
            哈希函数: ${document.getElementById('hashMethod').selectedOptions[0].text}<br>
            冲突处理: ${document.getElementById('collisionMethod').selectedOptions[0].text}
        </div>
    `;
    }
</script>
