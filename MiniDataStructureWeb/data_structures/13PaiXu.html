        /* 响应式优化 */

<div class="container">
    <h2>排序</h2>

    <div class="control-panel">
        <div>
            <input type="number" id="inputElement" placeholder="输入数字" min="0">
            <button onclick="addElement()" style="background-color: #228be6;">添加元素</button>
        </div>
        <br>
        <select id="algorithm">
            <option value="bubble">冒泡排序</option>
            <option value="quick">快速排序</option>
            <option value="insertion">直接插入排序</option>
            <option value="shell">希尔排序</option>
            <option value="selection">简单选择排序</option>
            <option value="merge">归并排序</option>
            <option value="radix">基数排序</option>
        </select>

        <select id="order">
            <option value="asc">升序</option>
            <option value="desc">降序</option>
        </select>

        <button onclick="startSort()" id="startBtn">开始排序</button>
        <button onclick="nextStep()" id="nextBtn" disabled>下一步排序对比</button>
        <button onclick="reset()" style="background:#dc3545">重置</button>

        <div class="status-info">
            <div id="status">当前状态：等待输入</div>
            <div style="margin-top: 10px">
                <span style="color: #17a2b8">比较次数：<span id="compareCount">0</span></span>
                <span style="margin-left: 15px; color: #dc3545">交换次数：<span id="swapCount">0</span></span>
            </div>
        </div>
    </div>

    <div id="chart"></div>
</div>
<script src="../js/echarts.js"></script>
<script>
    let myChart = echarts.init(document.getElementById('chart'));
    let dataArray = [];
    let currentStep = null;
    let isSorting = false;
    let sortGenerator = null;
    let originalArray = [];//原始数组变量

    // 全局统计变量
    let compareCount = 0;
    let swapCount = 0;

    // ECharts配置
    let option = {
        xAxis: [{
            type: 'category',
            data: []
        }],
        yAxis: [{
            type: 'value'
        }],
        series: [{
            data: [],
            type: 'bar',
            label: {
                show: true,
                position: 'top',
                color: '#333',
                fontSize: 14
            },
            itemStyle: {
                color: '#007bff'
            }
        }]
    };

    // 初始化图表
    myChart.setOption(option);

    function updateChart(highlightIndices = []) {
        let colors = dataArray.map((_, index) =>
            highlightIndices.includes(index) ? '#ff4d4d' : '#007bff'
        );
        option.xAxis[0].data = dataArray.map((_, i) => i.toString());
        option.series[0].data = dataArray.map(val => ({
            value: val,
            itemStyle: { color: null },
            label: { show: true }  // 显示数值标签
        }));

        option.series[0].itemStyle.color = params => colors[params.dataIndex];
        myChart.setOption(option);
    }

    //冒泡排序
    function* bubbleSort(arr, order) {
        compareCount = 0;
        swapCount = 0;
        let n = arr.length;
        for (let i = 0; i < n - 1; i++) {
            for (let j = 0; j < n - i - 1; j++) {
                // 比较计数
                compareCount++;
                let shouldSwap = order === 'asc' ? arr[j] > arr[j + 1] : arr[j] < arr[j + 1];
                yield {
                    highlight: [j, j + 1], desc: `比较 ${arr[j]} 和 ${arr[j + 1]}`,
                    compareCount, swapCount
                };

                if (shouldSwap) {
                    // 交换计数
                    swapCount++;
                    [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    yield {
                        highlight: [j, j + 1], desc: `交换 ${arr[j + 1]} 和 ${arr[j]}`,
                        compareCount, swapCount
                    };
                }
            }
        }
    }
    //快速排序
    function* quickSort(arr, order) {
        compareCount = 0;
        swapCount = 0;

        function* partition(low, high) {
            let pivot = arr[high];
            let i = low - 1;

            for (let j = low; j < high; j++) {
                compareCount++;
                let shouldSwap = order === 'asc' ? arr[j] <= pivot : arr[j] >= pivot;
                yield { highlight: [j, high], desc: `比较 ${arr[j]} 和 ${pivot}`, compareCount, swapCount };

                if (shouldSwap) {
                    i++;
                    swapCount++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                    if (i !== j) yield { highlight: [i, j], desc: `交换 ${arr[j]} 和 ${arr[i]}`, compareCount, swapCount };
                }
            }

            swapCount++;
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            yield { highlight: [i + 1, high], desc: `移动基准到正确位置`, compareCount, swapCount };
            return i + 1;
        }

        let stack = [[0, arr.length - 1]];
        while (stack.length) {
            let [low, high] = stack.pop();
            if (low >= high) continue;

            let partitionGen = partition(low, high);
            let result;
            while (!(result = partitionGen.next()).done) {
                yield result.value;
            }
            let pivotIdx = result.value;

            stack.push([pivotIdx + 1, high]);
            stack.push([low, pivotIdx - 1]);
        }
    }

    // 插入排序
    function* insertionSort(arr, order) {
        compareCount = 0;
        swapCount = 0;

        for (let i = 1; i < arr.length; i++) {
            let key = arr[i];
            let j = i - 1;

            while (j >= 0) {
                compareCount++;
                let shouldMove = order === 'asc' ? arr[j] > key : arr[j] < key;
                yield { highlight: [j, i], desc: `比较 ${arr[j]} 和 ${key}`, compareCount, swapCount };

                if (shouldMove) {
                    swapCount++;
                    arr[j + 1] = arr[j];
                    j--;
                    yield { highlight: [j + 1], desc: `移动 ${arr[j + 1]}`, compareCount, swapCount };
                } else {
                    break;
                }
            }
            arr[j + 1] = key;
            yield { highlight: [j + 1], desc: `插入 ${key} 到位置 ${j + 1}`, compareCount, swapCount };
        }
    }

    // 希尔排序
    function* shellSort(arr, order) {
        compareCount = 0;
        swapCount = 0;
        let n = arr.length;

        for (let gap = Math.floor(n / 2); gap > 0; gap = Math.floor(gap / 2)) {
            yield { highlight: [], desc: `新间隔：${gap}`, meta: { gap }, compareCount, swapCount };

            for (let i = gap; i < n; i++) {
                let temp = arr[i];
                let j;
                for (j = i; j >= gap; j -= gap) {
                    compareCount++;
                    let shouldSwap = order === 'asc' ? arr[j - gap] > temp : arr[j - gap] < temp;
                    yield { highlight: [j - gap, j], desc: `比较 ${arr[j - gap]} 和 ${temp}`, meta: { gap }, compareCount, swapCount };

                    if (shouldSwap) {
                        swapCount++;
                        arr[j] = arr[j - gap];
                        yield { highlight: [j], desc: `移动 ${arr[j]}`, meta: { gap }, compareCount, swapCount };
                    } else {
                        break;
                    }
                }
                arr[j] = temp;
                if (j !== i) yield { highlight: [j], desc: `插入 ${temp}`, meta: { gap }, compareCount, swapCount };
            }
        }
    }

    // 选择排序
    function* selectionSort(arr, order) {
        compareCount = 0;
        swapCount = 0;
        let n = arr.length;

        for (let i = 0; i < n - 1; i++) {
            let extremeIndex = i;
            yield { highlight: [extremeIndex], desc: `当前极值：${arr[extremeIndex]}`, meta: { extremeIndex }, compareCount, swapCount };

            for (let j = i + 1; j < n; j++) {
                compareCount++;
                let shouldUpdate = order === 'asc' ? arr[j] < arr[extremeIndex] : arr[j] > arr[extremeIndex];
                yield { highlight: [extremeIndex, j], desc: `比较 ${arr[j]} 和 ${arr[extremeIndex]}`, meta: { extremeIndex }, compareCount, swapCount };

                if (shouldUpdate) {
                    extremeIndex = j;
                    yield { highlight: [extremeIndex], desc: `新极值：${arr[extremeIndex]}`, meta: { extremeIndex }, compareCount, swapCount };
                }
            }

            if (extremeIndex !== i) {
                swapCount++;
                [arr[i], arr[extremeIndex]] = [arr[extremeIndex], arr[i]];
                yield { highlight: [i, extremeIndex], desc: `交换 ${arr[i]} 和 ${arr[extremeIndex]}`, compareCount, swapCount };
            }
        }
    }

    // 归并排序
    function* mergeSort(arr, order) {
        compareCount = 0;
        swapCount = 0;

        function* merge(low, mid, high) {
            let left = arr.slice(low, mid + 1);
            let right = arr.slice(mid + 1, high + 1);
            let i = 0, j = 0, k = low;

            while (i < left.length && j < right.length) {
                compareCount++;
                let shouldTakeLeft = order === 'asc' ? left[i] <= right[j] : left[i] >= right[j];
                yield { highlight: [low + i, mid + 1 + j], desc: `比较 ${left[i]} 和 ${right[j]}`, compareCount, swapCount };

                if (shouldTakeLeft) {
                    arr[k] = left[i++];
                } else {
                    arr[k] = right[j++];
                }
                k++;
            }

            while (i < left.length) arr[k++] = left[i++];
            while (j < right.length) arr[k++] = right[j++];
        }

        let currSize = 1;
        while (currSize < arr.length) {
            let low = 0;
            while (low < arr.length) {
                let mid = Math.min(low + currSize - 1, arr.length - 1);
                let high = Math.min(low + 2 * currSize - 1, arr.length - 1);
                yield* merge(low, mid, high);
                low += 2 * currSize;
            }
            currSize *= 2;
        }
    }

    // 基数排序
    function* radixSort(arr, order) {
        compareCount = 0;  // 基数排序没有传统比较
        swapCount = 0;

        const maxNum = Math.max(...arr.map(num => Math.abs(num)));
        const maxDigit = maxNum === 0 ? 1 : String(maxNum).length;

        for (let digit = 0; digit < maxDigit; digit++) {
            const buckets = Array.from({ length: 10 }, () => []);
            const base = Math.pow(10, digit);

            // 分配阶段
            for (let i = 0; i < arr.length; i++) {
                const num = arr[i];
                const digitValue = Math.floor(Math.abs(num) / base) % 10;
                buckets[digitValue].push(num);
                yield {
                    highlight: [i],
                    desc: `分配 ${num} 到桶 ${digitValue}`,
                    compareCount,
                    swapCount: ++swapCount  // 每个分配操作视为交换
                };
            }

            // 收集阶段
            let index = 0;
            const direction = order === 'asc' ? 1 : -1;
            const start = order === 'asc' ? 0 : 9;
            const end = order === 'asc' ? 10 : -1;

            for (let b = start; b !== end; b += direction) {
                for (const num of buckets[b]) {
                    arr[index++] = num;
                    yield {
                        highlight: [index - 1],
                        desc: `从桶 ${b} 收集 ${num}`,
                        compareCount,
                        swapCount: ++swapCount  // 每个收集操作视为交换
                    };
                }
            }
        }
    }

    // 排序验证函数
    function checkSorted(arr, order) {
        for (let i = 1; i < arr.length; i++) {
            if (order === 'asc' && arr[i - 1] > arr[i]) return false;
            if (order === 'desc' && arr[i - 1] < arr[i]) return false;
        }
        return true;
    }

    function startSort() {
        if (dataArray.length < 1) return;
        isSorting = true;
        document.getElementById('nextBtn').disabled = false;
        // 每次开始排序时创建副本
        const workingArray = [...dataArray];
        const algorithm = document.getElementById('algorithm').value;
        const order = document.getElementById('order').value;

        switch (algorithm) {
            case 'bubble':
                sortGenerator = bubbleSort(workingArray, order);
                break;
            case 'quick':
                sortGenerator = quickSort(workingArray, order);
                break;
            case 'insertion':
                sortGenerator = insertionSort(workingArray, order);
                break;
            case 'shell':
                sortGenerator = shellSort(workingArray, order);
                break;
            case 'selection':
                sortGenerator = selectionSort(workingArray, order);
                break;
            case 'merge':
                sortGenerator = mergeSort(workingArray, order);
                break;
            case 'radix':
                sortGenerator = radixSort(workingArray, order);
                break;
        }
        // 添加数组同步逻辑
        const updateData = () => dataArray = workingArray;
        const originalNext = sortGenerator.next;
        sortGenerator.next = function (...args) {
            const result = originalNext.apply(this, args);
            updateData();
            return result;
        }
    }

    function nextStep() {
        if (!isSorting || !sortGenerator) return;

        let result = sortGenerator.next();
        if (!result.done) {
            document.getElementById('compareCount').textContent = result.value.compareCount || 0;
            document.getElementById('swapCount').textContent = result.value.swapCount || 0;
            updateChart(result.value.highlight);

            // 构建状态信息
            let statusText = `当前状态：${result.value.desc}`;
            let metaHtml = '';
            if (result.value.meta) {
                const meta = result.value.meta;
                metaHtml = Object.entries(meta)
                    .map(([key, value]) => {
                        if (key === 'mergeRange') {
                            return `<span class="meta">合并范围：${value.low}-${value.high}</span>`;
                        }
                        return `<span class="meta">${key}: ${value}</span>`;
                    })
                    .join('');
            }
            document.getElementById('status').innerHTML = `
                <div>当前操作：${result.value.desc}</div>
                <div>${metaHtml}</div>
            `;
        } else {
            isSorting = false;
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('status').innerText = '当前状态：排序完成';
            document.getElementById('compareCount').textContent = compareCount;
            document.getElementById('swapCount').textContent = swapCount;
        }
    }

    function addElement() {
        let input = document.getElementById('inputElement');
        let value = parseInt(input.value);
        if (!isNaN(value)) {
            dataArray.push(value);
            originalArray.push(value); // 同时更新原始数组
            updateChart();
            input.value = '';
        }
    }

    function reset() {
        // 保留元素，恢复原始顺序
        dataArray = [...originalArray]; // 使用扩展运算符创建副本
        isSorting = false;
        sortGenerator = null;
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('status').innerText = '当前状态：已重置';
        // 重置统计
        compareCount = 0;
        swapCount = 0;
        document.getElementById('compareCount').textContent = '0';
        document.getElementById('swapCount').textContent = '0';
        updateChart();
    }
</script>
</body>
